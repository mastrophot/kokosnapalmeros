name: Sync Instagram Photos

on:
  schedule:
    - cron: '0 12 * * *'  # Раз на день о 12:00 UTC (14:00 за Києвом)
  workflow_dispatch:  # Дозволяє запускати вручну:

concurrency:
  group: sync-instagram-main
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          
      - name: Install Node.js dependencies
        run: |
          npm install

      - name: Validate required secrets
        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
        run: |
          missing=0
          if [ -z "$IG_USER_ID" ]; then
            echo "::error::Missing required secret: IG_USER_ID"
            missing=1
          fi
          if [ -z "$IG_ACCESS_TOKEN" ]; then
            echo "::error::Missing required secret: IG_ACCESS_TOKEN"
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
          
      - name: Download Instagram photos
        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          INSTAGRAM_USERNAME: ${{ vars.INSTAGRAM_USERNAME || 'kokosnapalmeros' }}
        run: |
          python3 sync-instagram.py --limit 20
          
      - name: Update gallery HTML
        run: |
          node update-gallery.js
          
      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add images/ gallery-data.json gallery-items.js index.html
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🤖 Auto-sync: Update gallery from Instagram"
            git push
          fi
