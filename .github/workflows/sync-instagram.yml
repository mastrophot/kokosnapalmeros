name: Sync Instagram Photos

on:
  schedule:
    - cron: '0 */12 * * *'  # Кожні 12 годин
  workflow_dispatch:  # Дозволяє запускати вручну

concurrency:
  group: sync-instagram-main
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install Node.js dependencies
        run: |
          npm install

      - name: Validate required secrets
        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
        run: |
          missing=0
          if [ -z "$IG_USER_ID" ]; then
            echo "::error::Missing required secret: IG_USER_ID. Go to Settings > Secrets > Actions and add it."
            echo "::notice::Get your IG_USER_ID from https://developers.facebook.com/tools/explorer/ — query 'me?fields=id' with your token."
            missing=1
          fi
          if [ -z "$IG_ACCESS_TOKEN" ]; then
            echo "::error::Missing required secret: IG_ACCESS_TOKEN. Go to Settings > Secrets > Actions and add it."
            echo "::notice::Generate a long-lived token at https://developers.facebook.com/tools/explorer/ then extend it via /oauth/access_token?grant_type=fb_exchange_token"
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
          echo "✅ All required secrets are set"

      - name: Refresh long-lived token (if possible)
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          FB_APP_ID: ${{ secrets.FB_APP_ID }}
          FB_APP_SECRET: ${{ secrets.FB_APP_SECRET }}
        run: |
          # Якщо є FB_APP_ID та FB_APP_SECRET, оновлюємо токен автоматично
          if [ -n "$FB_APP_ID" ] && [ -n "$FB_APP_SECRET" ]; then
            echo "🔄 Attempting to refresh long-lived token..."
            RESPONSE=$(curl -s "https://graph.facebook.com/v22.0/oauth/access_token?grant_type=fb_exchange_token&client_id=$FB_APP_ID&client_secret=$FB_APP_SECRET&fb_exchange_token=$IG_ACCESS_TOKEN")
            NEW_TOKEN=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('access_token',''))" 2>/dev/null)
            if [ -n "$NEW_TOKEN" ] && [ "$NEW_TOKEN" != "$IG_ACCESS_TOKEN" ]; then
              echo "✅ Token refreshed successfully"
              # Оновлюємо секрет через gh CLI (потребує PAT з admin:org scope)
              # echo "$NEW_TOKEN" | gh secret set IG_ACCESS_TOKEN --repo ${{ github.repository }}
              echo "::notice::Token was refreshed. Consider updating IG_ACCESS_TOKEN secret manually."
            else
              echo "ℹ️  Token refresh skipped (same token or error)"
            fi
          else
            echo "ℹ️  FB_APP_ID/FB_APP_SECRET not set — skipping token refresh"
            echo "::notice::To enable auto-refresh, add FB_APP_ID and FB_APP_SECRET secrets from your Facebook App dashboard"
          fi

      - name: Test API connectivity
        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
        run: |
          echo "🔍 Testing Graph API connectivity..."
          HTTP_CODE=$(curl -s -o /tmp/api_response.json -w "%{http_code}" \
            "https://graph.facebook.com/v22.0/$IG_USER_ID?fields=id,username&access_token=$IG_ACCESS_TOKEN")
          
          if [ "$HTTP_CODE" = "200" ]; then
            USERNAME=$(python3 -c "import json; d=json.load(open('/tmp/api_response.json')); print(d.get('username','unknown'))" 2>/dev/null)
            echo "✅ API connection OK — account: @$USERNAME"
          elif [ "$HTTP_CODE" = "190" ] || grep -q "OAuthException" /tmp/api_response.json 2>/dev/null; then
            echo "::error::Access token expired or invalid (HTTP $HTTP_CODE). Regenerate at https://developers.facebook.com/tools/explorer/"
            cat /tmp/api_response.json
            exit 1
          else
            echo "::warning::API returned HTTP $HTTP_CODE — sync may fail"
            cat /tmp/api_response.json
          fi

      - name: Download Instagram photos
        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          INSTAGRAM_USERNAME: ${{ vars.INSTAGRAM_USERNAME || 'kokosnapalmeros' }}
        run: |
          python3 sync-instagram.py --limit 50
          
      - name: Update gallery HTML
        run: |
          node update-gallery.js
          
      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add images/ gallery-data.json gallery-items.js index.html
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🤖 Auto-sync: Update gallery from Instagram"
            git push
          fi
